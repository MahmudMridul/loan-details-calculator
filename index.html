<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loan Details Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <!-- jsPDF + AutoTable for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <!-- html2canvas for JPG export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>Loan Details Calculator</h1>

      <form id="loanForm">
        <div class="form-group">
          <label for="loanAmount">Loan Amount</label>
          <input
            type="number"
            id="loanAmount"
            placeholder="e.g. 450000"
            min="1"
            step="1"
          />
          <span class="error" id="loanAmountError"></span>
        </div>

        <div class="form-group">
          <label for="interestRate">Annual Interest Rate (%)</label>
          <input
            type="number"
            id="interestRate"
            placeholder="e.g. 12.5"
            min="0.01"
            step="0.01"
          />
          <span class="error" id="interestRateError"></span>
        </div>

        <div class="form-group">
          <div class="label-row">
            <label for="tenure">Loan Tenure</label>
            <div class="tenure-toggle" role="group" aria-label="Tenure unit">
              <button type="button" class="toggle-btn active" id="btnMonths" data-unit="months">Months</button>
              <button type="button" class="toggle-btn" id="btnYears" data-unit="years">Years</button>
            </div>
          </div>
          <input
            type="number"
            id="tenure"
            placeholder="e.g. 36"
            min="1"
            step="1"
          />
          <span class="error" id="tenureError"></span>
        </div>

        <div class="btn-row">
          <button type="submit" id="calcBtn">Calculate</button>
          <button type="button" id="resetBtn">Reset</button>
        </div>
      </form>

      <div id="report" class="hidden">
        <div class="summary-grid">
          <div class="summary-card">
            <span class="label">Loan Amount</span>
            <span class="value" id="s-loan"></span>
          </div>
          <div class="summary-card">
            <span class="label">Annual Interest Rate</span>
            <span class="value" id="s-rate"></span>
          </div>
          <div class="summary-card">
            <span class="label">Tenure</span>
            <span class="value" id="s-tenure"></span>
          </div>
          <div class="summary-card highlight">
            <span class="label">Monthly Installment (EMI)</span>
            <span class="value" id="s-emi"></span>
          </div>
          <div class="summary-card">
            <span class="label">Total Amount Payable</span>
            <span class="value" id="s-total"></span>
          </div>
          <div class="summary-card">
            <span class="label">Total Interest Payable</span>
            <span class="value" id="s-interest"></span>
          </div>
        </div>

        <div class="table-actions">
          <button id="exportCsvBtn" class="export-btn btn-csv">Export CSV</button>
          <button id="exportPdfBtn" class="export-btn btn-pdf">Export PDF</button>
          <button id="exportJpgBtn" class="export-btn btn-jpg">Export JPG</button>
        </div>

        <div class="table-wrapper">
          <table id="scheduleTable">
            <thead>
              <tr>
                <th>Month</th>
                <th>Opening Balance</th>
                <th>Principal Paid</th>
                <th>Interest Paid</th>
                <th>Closing Balance</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
